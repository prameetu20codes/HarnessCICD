pipeline:
  name: ig-routes-repro
  identifier: ig_routes_repro
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  stages:
    - stage:
        name: deploy-repro
        identifier: deploy_repro
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: ig_routes_repro
          environment:
            environmentRef: ig_repro_dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: ig_repro_k8s
          execution:
            steps:
              # Dry-run renders the manifest through Harness's pipeline WITHOUT
              # applying to the cluster. This is the fastest way to SEE the
              # rewritten ConfigMap in the step output/logs.
              - step:
                  name: Dry Run
                  identifier: dryRun
                  type: K8sDryRun
                  timeout: 10m
                  spec: {}
              # Optional: actually apply. Requires a real cluster connector.
              - step:
                  name: Rollout Deployment
                  identifier: rollout
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback
                  identifier: rollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
